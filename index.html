<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ScentForge — Запуск</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0b; color: #f5f0e8; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 24px; }
    .box { max-width: 520px; background: #141416; border: 1px solid #2a2a2e; border-radius: 12px; padding: 32px; text-align: center; }
    h1 { color: #c9a962; margin-bottom: 16px; }
    p { color: #8a8680; line-height: 1.6; }
    .step { background: #1c1c1f; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: left; }
    a { color: #c9a962; }
  </style>
</head>
<body>
  <div class="box">
    <h1>ScentForge</h1>
    <p>Этот файл нельзя открывать напрямую.<br>Google-авторизация работает только через сервер.</p>
    <div class="step"><strong>1.</strong> Дважды щёлкните <strong>start.bat</strong> в папке проекта</div>
    <div class="step"><strong>2.</strong> Дождитесь открытия <a href="http://localhost:3000">http://localhost:3000</a></div>
    <div class="step"><strong>3.</strong> Не закрывайте чёрное окно cmd</div>
    <p style="margin-top:20px"><a href="http://localhost:3000">Открыть localhost:3000</a></p>
  </div>
</body>
</html>
