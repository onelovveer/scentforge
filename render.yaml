services:
  - type: web
    name: scentforge
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/auth/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_GOOGLE_ID
        sync: false
      - key: CRM_PROVIDER
        value: amocrm
      - key: AMOCRM_SUBDOMAIN
        sync: false
      - key: AMOCRM_ACCESS_TOKEN
        sync: false
      - key: AMOCRM_PIPELINE_ID
        sync: false
      - key: AMOCRM_STATUS_ID
        sync: false
