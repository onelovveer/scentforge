<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление товарами — ScentForge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-inner container">
            <div class="logo">
                <a href="/"><span>Scent</span><span>Forge</span></a>
            </div>
            <nav class="nav">
                <a href="/">Магазин</a>
                <a href="/admin.html">Товары</a>
                <a href="#">амоCRM</a>
            </nav>
            <div class="header-actions">
                <a href="/" class="btn btn-ghost btn-sm">На сайт</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding: 60px 24px;">
        <div class="page-header">
            <h1 class="section-title">Управление товарами</h1>
            <p class="section-subtitle">Добавление, редактирование и удаление ассортимента магазина.</p>
        </div>

        <div style="margin-bottom: 24px;">
            <button id="addProductBtn" class="btn btn-primary">+ Добавить товар</button>
        </div>

        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Фото</th>
                        <th>Бренд</th>
                        <th>Название</th>
                        <th>Цена</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <!-- Товары будут здесь -->
                </tbody>
            </table>
        </div>

        <!-- Модальное окно добавления/редактирования -->
        <div id="productModal" class="modal-overlay">
            <div class="modal" style="max-width: 600px;">
                <span class="close">&times;</span>
                <h3 id="modalTitle">Добавить товар</h3>
                <form id="productForm" style="margin-top: 24px;">
                    <div class="form-group">
                        <label>Бренд</label>
                        <input type="text" id="productBrand" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" id="productName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Цена (₽)</label>
                        <input type="number" id="productPrice" class="form-input" required min="1">
                    </div>
                    <div class="form-group">
                        <label>Объем</label>
                        <input type="text" id="productVolume" class="form-input" placeholder="например: 100 мл">
                    </div>
                    <div class="form-group">
                        <label>URL изображения</label>
                        <input type="url" id="productImage" class="form-input" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Ноты</label>
                        <input type="text" id="productNotes" class="form-input" placeholder="верхние, средние, базовые ноты">
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea id="productDescription" class="form-input" rows="3"></textarea>
                        <button type="button" id="generateDescBtn" class="btn btn-outline btn-sm" style="margin-top: 8px;">
                            ✨ Сгенерировать ИИ-описание
                        </button>
                    </div>
                    <div style="display: flex; gap: 12px; margin-top: 24px;">
                        <button type="button" class="btn btn-ghost close-modal" style="flex: 1;">Отмена</button>
                        <button type="submit" class="btn btn-primary" style="flex: 1;">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 ScentForge. Маркетплейс мужской парфюмерии.</p>
        </div>
    </footer>

    <script src="admin.js"></script>
</body>
</html>
