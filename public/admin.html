<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Управление товарами — ScentForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=4">
  <style>
    #product-modal.open { display: flex !important; z-index: 9999; }
    .admin-container { padding-top: 40px; padding-bottom: 80px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .product-thumb { width: 40px; height: 40px; object-fit: contain; background: #fff; border-radius: 4px; }
    .actions-cell { display: flex; gap: 8px; }

    /* Modal Styles */
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .full-width { grid-column: span 2; }

    .ai-gen-btn {
      margin-top: 8px;
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s;
    }
    .ai-gen-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    textarea.form-input { min-height: 100px; resize: vertical; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">Scent<span>Forge</span></a>
      <nav class="nav" style="display: flex;">
        <a href="/">Магазин</a>
        <a href="/admin.html" class="active">Товары</a>
        <a id="crm-link" href="#">амоCRM</a>
      </nav>
      <div class="header-actions">
        <div id="user-info" class="user-menu">
          <!-- JS -->
        </div>
        <a href="/" class="btn btn-outline btn-sm">На сайт</a>
      </div>
    </div>
  </header>

  <main class="container admin-container">
    <div class="admin-header">
      <div>
        <h1 class="section-title">Управление товарами</h1>
        <p class="section-subtitle">Добавление, редактирование и удаление ассортимента магазина.</p>
      </div>
      <button id="add-product-btn" class="btn btn-primary">+ Добавить товар</button>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Фото</th>
            <th>Бренд</th>
            <th>Название</th>
            <th>Цена</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="products-tbody">
          <!-- JS -->
        </tbody>
      </table>
    </div>
  </main>

  <!-- Product Modal -->
  <div id="product-modal" class="modal-overlay">
    <div class="modal-content">
      <h2 id="modal-title" style="margin-bottom:20px; font-family:var(--font-display)">Добавить товар</h2>
      <form id="product-form">
        <input type="hidden" id="product-id">
        <div class="modal-grid">
          <div class="form-group">
            <label>Бренд</label>
            <input type="text" id="p-brand" class="form-input" placeholder="Напр: Dior" required>
          </div>
          <div class="form-group">
            <label>Название</label>
            <input type="text" id="p-name" class="form-input" placeholder="Напр: Sauvage" required>
          </div>
          <div class="form-group">
            <label>Цена (₽)</label>
            <input type="number" id="p-price" class="form-input" placeholder="11900" required>
          </div>
          <div class="form-group">
            <label>Объем</label>
            <input type="text" id="p-volume" class="form-input" placeholder="100 ml" required>
          </div>
          <div class="form-group full-width">
            <label>URL изображения</label>
            <input type="text" id="p-image" class="form-input" placeholder="images/perfumes/filename.jpg" required>
          </div>
          <div class="form-group full-width">
            <label>Ноты</label>
            <input type="text" id="p-notes" class="form-input" placeholder="Бергамот, перец, амброксан" required>
          </div>
          <div class="form-group full-width">
            <label>Описание</label>
            <textarea id="p-description" class="form-input" placeholder="Краткое описание товара..." required></textarea>
            <button type="button" id="generate-desc-btn" class="ai-gen-btn">
              ✨ Сгенерировать ИИ-описание
            </button>
          </div>
        </div>
        <div style="margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end;">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Отмена</button>
          <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/config.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
  <script src="js/admin.js?v=4"></script>
</body>
</html>
