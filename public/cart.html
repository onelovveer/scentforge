<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина — ScentForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=4">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">Scent<span>Forge</span></a>
      <nav class="nav">
        <a href="index.html">Каталог</a>
        <a href="cart.html" class="active">Корзина</a>
        <a href="profile.html">Профиль</a>
        <a href="admin.html" id="admin-link" style="display:none">Админ</a>
        <a href="#" id="crm-link" style="display:none" target="_blank">амоCRM</a>
      </nav>
      <div class="header-actions">
        <span class="balance-badge" id="header-balance" style="display:none">0 ₽</span>
        <a href="cart.html" class="cart-btn" aria-label="Корзина">
          🛒
          <span class="cart-count" id="cart-count" style="display:none">0</span>
        </a>
        <div class="user-menu" id="user-menu">
          <a href="#" class="btn btn-outline btn-sm" data-auth-link>Войти через Google</a>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <h1>Корзина</h1>
    </div>

    <div id="cart-content" style="display:none">
      <div class="cart-layout">
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-summary" id="cart-summary">
          <h3>Итого</h3>
          <div class="summary-row"><span>Товаров</span><span id="summary-count">0</span></div>
          <div class="summary-row"><span>Ваш баланс</span><span id="summary-balance">0 ₽</span></div>
          <div class="summary-total"><span>К оплате</span><span id="summary-total">0 ₽</span></div>
          <p id="balance-warning" style="display:none;font-size:0.85rem;color:#e74c3c;margin:12px 0 0;text-align:center"></p>
          <button type="button" class="btn btn-primary" style="width:100%;margin-top:12px" id="checkout-btn">Оплатить с баланса</button>
          <p id="order-email-hint" style="font-size:0.8rem;color:var(--text-muted);margin-top:12px;text-align:center;display:none">
            Подтверждение заказа придёт на: <strong id="order-email"></strong>
          </p>
          <p style="font-size:0.8rem;color:var(--text-muted);margin-top:8px;text-align:center">
            Средства списываются с баланса аккаунта
          </p>
        </div>
      </div>
    </div>

    <div class="empty-state" id="cart-empty" style="display:none">
      <div class="empty-state-icon">🛒</div>
      <h2>Корзина пуста</h2>
      <p style="margin:12px 0 24px">Добавьте ароматы из каталога</p>
      <a href="index.html" class="btn btn-primary">Перейти в каталог</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
  <script src="js/cart.js?v=4"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initAuth().then(() => initCartPage());
    });
  </script>
</body>
</html>
