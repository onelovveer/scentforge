<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScentForge CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .crm-login-wrap {
      min-height: 70vh;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .crm-login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }
    .crm-login-card h2 {
      font-family: var(--font-display);
      margin-bottom: 8px;
    }
    .crm-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .crm-badge {
      font-size: 0.75rem;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 4px 10px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div id="crm-login" class="crm-login-wrap">
    <div class="crm-login-card">
      <h2>ScentForge CRM</h2>
      <p style="color:var(--text-muted);margin-bottom:20px;font-size:0.9rem">
        Внешняя панель управления заказами. Ключ выдаётся автоматически администратору магазина.
      </p>
      <form id="login-form">
        <div class="form-group">
          <label for="crm-key">Ключ доступа</label>
          <input type="password" class="form-input" id="crm-key" placeholder="Ключ CRM" required autocomplete="off">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Войти</button>
      </form>
      <p style="font-size:0.8rem;color:var(--text-muted);margin-top:16px;text-align:center">
        Админ магазина: войдите на сайт и нажмите «CRM» в меню
      </p>
    </div>
  </div>

  <div id="crm-app" style="display:none">
    <header class="header">
      <div class="container header-inner">
        <a href="/" class="logo">Scent<span>Forge</span> <span class="crm-badge">CRM</span></a>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" id="refresh-btn">Обновить</button>
          <button class="btn btn-ghost btn-sm" id="logout-btn">Выйти</button>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="crm-header">
        <h1 style="font-family:var(--font-display);font-size:1.8rem">Управление заказами</h1>
      </div>

      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-orders">0</div>
          <div class="stat-label">Заказов</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-revenue">0 ₽</div>
          <div class="stat-label">Выручка</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-users">0</div>
          <div class="stat-label">Пользователей</div>
        </div>
      </div>

      <h2 class="section-title" style="margin:32px 0 20px">Все заказы</h2>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Дата</th>
              <th>Клиент</th>
              <th>Товары</th>
              <th>Сумма</th>
              <th>Статус</th>
            </tr>
          </thead>
          <tbody id="orders-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="crm-app.js"></script>
</body>
</html>
