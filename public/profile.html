<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — ScentForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">Scent<span>Forge</span></a>
      <nav class="nav">
        <a href="index.html">Каталог</a>
        <a href="cart.html">Корзина</a>
        <a href="profile.html" class="active">Профиль</a>
        <a href="admin.html" id="admin-link" style="display:none">CRM</a>
      </nav>
      <div class="header-actions">
        <span class="balance-badge" id="header-balance" style="display:none">0 ₽</span>
        <a href="cart.html" class="cart-btn" aria-label="Корзина">
          🛒
          <span class="cart-count" id="cart-count" style="display:none">0</span>
        </a>
        <div class="user-menu" id="user-menu">
          <a href="#" class="btn btn-outline btn-sm" data-auth-link>Войти через Google</a>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <h1>Личный кабинет</h1>
    </div>

    <div id="profile-guest" style="display:none">
      <div class="empty-state">
        <div class="empty-state-icon">👤</div>
        <h2>Войдите в аккаунт</h2>
        <p style="margin:12px 0 24px">Для доступа к профилю и балансу</p>
        <a href="#" class="btn btn-primary" data-auth-link>Войти через Google</a>
      </div>
    </div>

    <div class="profile-grid" id="profile-content" style="display:none">
      <div class="profile-card">
        <h3>Профиль</h3>
        <div class="profile-user">
          <img id="profile-avatar" src="" alt="">
          <div>
            <div id="profile-name" style="font-size:1.2rem;font-weight:600"></div>
            <div id="profile-email" style="color:var(--text-muted);font-size:0.9rem"></div>
          </div>
        </div>
        <a href="/auth/logout" class="btn btn-ghost btn-sm" id="logout-btn">Выйти</a>
      </div>

      <div class="profile-card">
        <h3>Баланс</h3>
        <div class="balance-display" id="profile-balance">0 ₽</div>
        <form id="topup-form">
          <div class="form-group">
            <label for="topup-amount">Сумма пополнения (₽)</label>
            <input type="number" class="form-input" id="topup-amount" min="1" max="1000000" placeholder="5000" required>
          </div>
          <button type="submit" class="btn btn-primary">Пополнить баланс</button>
        </form>
        <p style="font-size:0.8rem;color:var(--text-muted);margin-top:12px">
          Демо-режим: средства зачисляются мгновенно
        </p>
      </div>

      <div class="profile-card" style="grid-column: 1 / -1">
        <h3>Мои заказы</h3>
        <div class="orders-list" id="my-orders">
          <p style="color:var(--text-muted)">Заказов пока нет</p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await initAuth();
      if (!currentUser) {
        document.getElementById('profile-guest').style.display = 'block';
        return;
      }
      document.getElementById('profile-content').style.display = 'grid';
      document.getElementById('profile-avatar').src = currentUser.avatar || '';
      document.getElementById('profile-name').textContent = currentUser.name;
      document.getElementById('profile-email').textContent = currentUser.email;
      document.getElementById('profile-balance').textContent = formatPrice(currentUser.balance);

      document.getElementById('logout-btn').href = SF.api('/auth/logout');

      document.getElementById('topup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const amount = parseFloat(document.getElementById('topup-amount').value);
        try {
          const res = await SF.fetch('/api/balance/topup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          currentUser.balance = data.balance;
          document.getElementById('profile-balance').textContent = formatPrice(data.balance);
          updateHeaderUI();
          showToast(data.message, 'success');
          document.getElementById('topup-amount').value = '';
        } catch (err) {
          showToast(err.message, 'error');
        }
      });

      try {
        const res = await SF.fetch('/api/orders/my');
        const orders = await res.json();
        const container = document.getElementById('my-orders');
        if (orders.length === 0) return;
        container.innerHTML = orders.map(o => `
          <div class="order-item">
            <div class="order-item-header">
              <span class="order-id">Заказ #${o.id}</span>
              <span class="order-date">${new Date(o.created_at).toLocaleString('ru-RU')}</span>
            </div>
            <div>${o.items.map(i => `${i.name} × ${i.qty}`).join(', ')}</div>
            <div style="margin-top:8px;font-weight:600;color:var(--gold)">${formatPrice(o.total)}</div>
          </div>
        `).join('');
      } catch { /* ignore */ }
    });
  </script>
</body>
</html>
